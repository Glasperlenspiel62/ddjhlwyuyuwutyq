<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TaskFlow" />
  <title>TaskFlow</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f14;
      --surface: #17171f;
      --surface2: #1e1e28;
      --border: #2a2a38;
      --accent-today: #ff6b35;
      --accent-soon: #f7c948;
      --accent-someday: #6c8fff;
      --accent-done: #4ecdc4;
      --accent-habit: #b57bee;
      --text: #e8e8f0;
      --text-dim: #7070a0;
      --text-faint: #3a3a55;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
    }

    /* ── HEADER ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: env(safe-area-inset-top, 0px) 20px 0;
      background: var(--bg);
    }
    #header-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0 0;
    }
    #app-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    #header-actions { display: flex; gap: 8px; align-items: center; }

    #btn-settings {
      width: 36px; height: 36px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-dim); font-size: 16px;
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    #btn-settings:active { transform: scale(0.95); opacity: 0.8; }

    #btn-archive {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-dim); font-family: 'Syne', sans-serif;
      font-size: 12px; font-weight: 700; letter-spacing: 0.05em;
      padding: 7px 13px; border-radius: 20px; cursor: pointer;
      transition: all 0.2s;
    }
    #btn-archive:active { transform: scale(0.95); opacity: 0.8; }

    /* ── TABS ── */
    #tabs {
      display: flex;
      margin-top: 14px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    #tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex: 0 0 auto;
      padding: 10px 12px; background: none; border: none;
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--text-faint); cursor: pointer;
      position: relative; transition: color 0.2s;
      white-space: nowrap;
    }
    .tab-btn::after {
      content: ''; position: absolute; bottom: -1px; left: 10%; right: 10%;
      height: 2px; border-radius: 2px;
      background: transparent; transition: background 0.2s;
    }
    .tab-btn.active { color: var(--text); }
    .tab-btn[data-list="today"].active::after   { background: var(--accent-today); }
    .tab-btn[data-list="soon"].active::after    { background: var(--accent-soon); }
    .tab-btn[data-list="someday"].active::after { background: var(--accent-someday); }
    .tab-btn[data-list="done"].active::after    { background: var(--accent-done); }
    .tab-btn[data-list="habits"].active::after  { background: var(--accent-habit); }
    .tab-btn[data-list="stats"].active::after   { background: var(--accent-someday); }

    .tab-count {
      display: inline-block; margin-left: 4px;
      font-size: 10px; opacity: 0.7;
    }
    .tab-btn[data-list="today"] .tab-count   { color: var(--accent-today); }
    .tab-btn[data-list="soon"] .tab-count    { color: var(--accent-soon); }
    .tab-btn[data-list="someday"] .tab-count { color: var(--accent-someday); }
    .tab-btn[data-list="done"] .tab-count    { color: var(--accent-done); }
    .tab-btn[data-list="habits"] .tab-count  { color: var(--accent-habit); }

    /* ── SLIDES ── */
    #header-placeholder { height: 120px; }
    #slides-wrapper {
      position: fixed;
      top: 120px; left: 0; right: 0;
      bottom: env(safe-area-inset-bottom, 0px);
      overflow: hidden;
    }
    #slides-track {
      display: flex; width: 600%;
      height: 100%;
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      will-change: transform;
    }
    .slide {
      width: 16.6667%; height: 100%;
      overflow-y: auto;
      padding: 16px 16px 100px;
      -webkit-overflow-scrolling: touch;
    }
    .slide#slide-stats {
      padding: 16px 0 100px;
      overflow-x: hidden;
    }

    /* ── TASK CARD ── */
    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 14px 14px 12px;
      margin-bottom: 10px;
      display: flex; align-items: flex-start; gap: 12px;
      position: relative;
      transition: transform 0.15s, opacity 0.15s, border-color 0.2s;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
    }
    .task-card:active { transform: scale(0.98); }
    .task-card.hold-active {
      border-color: var(--accent-soon);
      box-shadow: 0 0 0 2px rgba(247,201,72,0.25);
      transform: scale(1.01);
    }

    .task-checkbox {
      width: 22px; height: 22px; min-width: 22px;
      border-radius: 6px; border: 2px solid var(--border);
      cursor: pointer; appearance: none; -webkit-appearance: none;
      background: var(--surface2); margin-top: 1px;
      transition: all 0.2s; position: relative;
    }
    .task-checkbox:checked {
      background: var(--accent-done);
      border-color: var(--accent-done);
    }
    .task-checkbox:checked::after {
      content: ''; position: absolute;
      left: 5px; top: 2px; width: 7px; height: 11px;
      border: 2px solid var(--bg); border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    .task-body { flex: 1; min-width: 0; }
    .task-text { font-size: 15px; line-height: 1.5; word-break: break-word; }
    .task-text.done-text { color: var(--text-dim); text-decoration: line-through; }
    .task-meta { font-size: 11px; color: var(--text-faint); font-family: 'Space Mono', monospace; margin-top: 5px; }
    .task-meta span { display: inline-block; margin-right: 10px; }
    .task-meta .done-date { color: var(--accent-done); opacity: 0.7; }

    /* ── HABIT CARD ── */
    .habit-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 14px 14px 12px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 12px;
      transition: transform 0.15s;
      user-select: none;
      -webkit-user-select: none;
    }
    .habit-card:active { transform: scale(0.98); }

    .habit-checkbox {
      width: 22px; height: 22px; min-width: 22px;
      border-radius: 50%; border: 2px solid var(--accent-habit);
      cursor: pointer; appearance: none; -webkit-appearance: none;
      background: var(--surface2);
      transition: all 0.2s; position: relative; flex-shrink: 0;
    }
    .habit-checkbox:checked {
      background: var(--accent-habit);
      border-color: var(--accent-habit);
    }
    .habit-checkbox:checked::after {
      content: ''; position: absolute;
      left: 5px; top: 2px; width: 7px; height: 11px;
      border: 2px solid var(--bg); border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    .habit-name {
      flex: 1; font-size: 15px; line-height: 1.5; word-break: break-word;
    }
    .habit-name.done-habit { color: var(--text-dim); text-decoration: line-through; }

    /* ── DELETE BTN ── */
    .task-delete {
      background: none; border: none; cursor: pointer;
      color: var(--text-faint); font-size: 16px; padding: 4px;
      border-radius: 6px; transition: color 0.15s, background 0.15s;
      align-self: center; line-height: 1; flex-shrink: 0;
    }
    .task-delete:active { color: #ff5555; background: rgba(255,85,85,0.1); }

    /* ── ADD AREA ── */
    .add-area {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 16px calc(env(safe-area-inset-bottom, 0px) + 12px);
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      display: none;
    }
    .add-area.visible { display: block; }
    .add-row {
      display: flex; gap: 10px; align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 4px 4px 14px;
    }
    .add-input {
      flex: 1; background: none; border: none; outline: none;
      font-family: 'Syne', sans-serif; font-size: 15px;
      color: var(--text); padding: 10px 0;
    }
    .add-input::placeholder { color: var(--text-faint); }
    .add-btn {
      width: 40px; height: 40px; border-radius: 10px;
      border: none; cursor: pointer; font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s;
    }
    .add-btn:active { transform: scale(0.9); }
    #add-today-btn   { background: var(--accent-today);   color: #fff; }
    #add-soon-btn    { background: var(--accent-soon);    color: var(--bg); }
    #add-someday-btn { background: var(--accent-someday); color: #fff; }
    #add-habits-btn  { background: var(--accent-habit);   color: #fff; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-faint); font-size: 14px;
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    /* ── STATS ── */
    #stats-controls {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; padding: 0 16px 12px;
    }
    #stats-month-label {
      font-size: 15px; font-weight: 700;
      min-width: 150px; text-align: center;
    }
    .stats-nav-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: 18px; font-weight: 700;
      width: 36px; height: 36px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .stats-nav-btn:active { transform: scale(0.9); }
    .stats-nav-btn:disabled { opacity: 0.25; cursor: default; }

    #stats-landscape-hint {
      text-align: center; color: var(--text-faint);
      font-size: 11px; padding: 0 16px 10px;
    }
    @media (orientation: landscape) { #stats-landscape-hint { display: none; } }

    #stats-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 16px 16px;
    }
    #stats-table {
      border-collapse: collapse;
      width: max-content;
    }
    #stats-table th {
      background: var(--surface2); color: var(--text-dim);
      font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 400;
      padding: 7px 6px; border: 1px solid var(--border);
      white-space: nowrap;
    }
    #stats-table th.habit-col {
      text-align: left; min-width: 120px;
      position: sticky; left: 0; z-index: 2;
      border-right: 2px solid var(--border);
    }
    #stats-table th.today-th { color: var(--accent-habit); font-weight: 700; }

    #stats-table td {
      border: 1px solid var(--border);
      text-align: center; font-size: 11px;
      height: 36px; min-width: 30px;
      background: var(--surface);
    }
    #stats-table td.habit-name-cell {
      text-align: left; padding: 0 10px;
      font-size: 12px; font-weight: 600; color: var(--text);
      min-width: 120px; max-width: 160px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      position: sticky; left: 0; z-index: 1;
      background: var(--surface);
      border-right: 2px solid var(--border);
    }
    #stats-table tr:nth-child(even) td { background: var(--surface2); }
    #stats-table tr:nth-child(even) td.habit-name-cell { background: var(--surface2); }

    #stats-table td.day-done {
      background: var(--accent-habit); color: var(--bg);
      font-weight: 700; font-size: 13px;
    }
    #stats-table td.day-future { opacity: 0.2; }
    #stats-table td.day-today { box-shadow: inset 0 0 0 2px var(--accent-habit); }

    /* ── MOVE MODAL ── */
    #move-modal {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
      align-items: flex-end; justify-content: center;
    }
    #move-modal.open { display: flex; }
    #move-sheet {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 20px 20px calc(env(safe-area-inset-bottom, 0px) + 20px);
      width: 100%; max-width: 500px;
      animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    #move-sheet h3 { font-size: 16px; font-weight: 800; margin-bottom: 16px; color: var(--text-dim); }
    .move-option {
      width: 100%; padding: 16px; margin-bottom: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 700; color: var(--text);
      cursor: pointer; text-align: left; transition: all 0.15s;
    }
    .move-option:active { transform: scale(0.98); }
    .move-option.opt-today { border-color: var(--accent-today); color: var(--accent-today); }
    .move-option.opt-soon  { border-color: var(--accent-soon);  color: var(--accent-soon); }
    #move-cancel {
      width: 100%; padding: 14px; background: none;
      border: 1px solid var(--border); border-radius: 10px;
      font-family: 'Syne', sans-serif; font-size: 14px;
      color: var(--text-dim); cursor: pointer; margin-top: 4px;
    }

    /* ── SETTINGS MODAL ── */
    #settings-modal {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
      align-items: flex-end; justify-content: center;
    }
    #settings-modal.open { display: flex; }
    #settings-sheet {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 20px calc(env(safe-area-inset-bottom, 0px) + 20px);
      width: 100%; max-width: 500px;
      animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    #settings-sheet h3 { font-size: 18px; font-weight: 800; margin-bottom: 20px; }
    .settings-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px;
    }
    #palette-grid {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 10px; margin-bottom: 24px;
    }
    .palette-chip {
      background: none; border: 2px solid var(--border);
      border-radius: 12px; padding: 10px 4px 8px;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 6px; transition: all 0.2s;
    }
    .palette-chip.active {
      border-color: var(--accent-someday);
      background: rgba(108,143,255,0.08);
    }
    .palette-chip:active { transform: scale(0.95); }
    .palette-preview { display: flex; gap: 3px; }
    .palette-dot { width: 10px; height: 10px; border-radius: 50%; }
    .palette-name {
      font-size: 9px; font-weight: 700; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--text-dim); text-align: center;
    }
    #settings-close {
      width: 100%; padding: 14px; background: none;
      border: 1px solid var(--border); border-radius: 10px;
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
      color: var(--text); cursor: pointer; transition: background 0.15s;
    }
    #settings-close:active { background: var(--surface2); }

    /* ── TOAST ── */
    #toast {
      position: fixed; top: 80px; left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 10px 18px;
      font-size: 13px; font-weight: 700; color: var(--text);
      opacity: 0; transition: all 0.3s; z-index: 300; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <div id="app-title">TaskFlow</div>
    <div id="header-actions">
      <button id="btn-settings">⚙</button>
      <button id="btn-archive">⬇ Архів</button>
    </div>
  </div>
  <div id="tabs">
    <button class="tab-btn active" data-list="today">Сьогодні<span class="tab-count" id="count-today"></span></button>
    <button class="tab-btn" data-list="soon">Скоро<span class="tab-count" id="count-soon"></span></button>
    <button class="tab-btn" data-list="someday">Колись<span class="tab-count" id="count-someday"></span></button>
    <button class="tab-btn" data-list="done">Виконані<span class="tab-count" id="count-done"></span></button>
    <button class="tab-btn" data-list="habits">Звички<span class="tab-count" id="count-habits"></span></button>
    <button class="tab-btn" data-list="stats">Статистика</button>
  </div>
</div>

<div id="slides-wrapper">
  <div id="slides-track">
    <div class="slide" id="slide-today"></div>
    <div class="slide" id="slide-soon"></div>
    <div class="slide" id="slide-someday"></div>
    <div class="slide" id="slide-done"></div>
    <div class="slide" id="slide-habits"></div>
    <div class="slide" id="slide-stats">
      <div id="stats-controls">
        <button class="stats-nav-btn" id="stats-prev">‹</button>
        <div id="stats-month-label"></div>
        <button class="stats-nav-btn" id="stats-next">›</button>
      </div>
      <div id="stats-landscape-hint">↻ Поверніть телефон горизонтально для кращого перегляду</div>
      <div id="stats-table-wrap">
        <table id="stats-table"></table>
      </div>
    </div>
  </div>
</div>

<div class="add-area visible" id="add-today">
  <div class="add-row">
    <input class="add-input" id="input-today" placeholder="Нова задача на сьогодні…" maxlength="300" />
    <button class="add-btn" id="add-today-btn">+</button>
  </div>
</div>
<div class="add-area" id="add-soon">
  <div class="add-row">
    <input class="add-input" id="input-soon" placeholder="Нова задача на скоро…" maxlength="300" />
    <button class="add-btn" id="add-soon-btn">+</button>
  </div>
</div>
<div class="add-area" id="add-someday">
  <div class="add-row">
    <input class="add-input" id="input-someday" placeholder="Нова задача колись…" maxlength="300" />
    <button class="add-btn" id="add-someday-btn">+</button>
  </div>
</div>
<div class="add-area" id="add-habits">
  <div class="add-row">
    <input class="add-input" id="input-habits" placeholder="Нова звичка…" maxlength="200" />
    <button class="add-btn" id="add-habits-btn">+</button>
  </div>
</div>

<div id="move-modal">
  <div id="move-sheet">
    <h3>Перенести задачу до…</h3>
    <button class="move-option opt-today" id="move-to-today">⚡ Сьогодні</button>
    <button class="move-option opt-soon" id="move-to-soon">🔜 Скоро</button>
    <button id="move-cancel">Скасувати</button>
  </div>
</div>

<div id="settings-modal">
  <div id="settings-sheet">
    <h3>Налаштування</h3>
    <div class="settings-label">Кольорова палітра</div>
    <div id="palette-grid"></div>
    <button id="settings-close">Готово</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── PALETTES ────────────────────────────────────────────────────
const PALETTES = {
  dark: {
    name: 'Темна',
    dots: ['#0f0f14','#b57bee','#e8e8f0'],
    vars: {
      '--bg':'#0f0f14','--surface':'#17171f','--surface2':'#1e1e28',
      '--border':'#2a2a38','--accent-today':'#ff6b35','--accent-soon':'#f7c948',
      '--accent-someday':'#6c8fff','--accent-done':'#4ecdc4','--accent-habit':'#b57bee',
      '--text':'#e8e8f0','--text-dim':'#7070a0','--text-faint':'#3a3a55'
    }
  },
  catppuccin: {
    name: 'Mocha',
    dots: ['#1e1e2e','#cba6f7','#cdd6f4'],
    vars: {
      '--bg':'#1e1e2e','--surface':'#313244','--surface2':'#45475a',
      '--border':'#585b70','--accent-today':'#f38ba8','--accent-soon':'#fab387',
      '--accent-someday':'#89b4fa','--accent-done':'#a6e3a1','--accent-habit':'#cba6f7',
      '--text':'#cdd6f4','--text-dim':'#a6adc8','--text-faint':'#6c7086'
    }
  },
  tokyo: {
    name: 'Tokyo',

    }
  },
  rose: {
    name: 'Rosé Pine',
    dots: ['#191724','#eb6f92','#e0def4'],
    vars: {
      '--bg':'#191724','--surface':'#1f1d2e','--surface2':'#26233a',
      '--border':'#403d52','--accent-today':'#eb6f92','--accent-soon':'#f6c177',
      '--accent-someday':'#9ccfd8','--accent-done':'#31748f','--accent-habit':'#c4a7e7',

    }

};

// ─── SETTINGS ────────────────────────────────────────────────────
let settings = { palette: 'dark' };

function loadSettings() {
  try { const s = localStorage.getItem('taskflow_settings'); if (s) settings = {...settings,...JSON.parse(s)}; } catch(e) {}
}
function saveSettings() {
  localStorage.setItem('taskflow_settings', JSON.stringify(settings));
}
function applyPalette(name) {
  if (!PALETTES[name]) return;
  const p = PALETTES[name];
  Object.entries(p.vars).forEach(([k,v]) => document.documentElement.style.setProperty(k,v));
  settings.palette = name;
  saveSettings();
  document.querySelector('meta[name="theme-color"]').content = p.vars['--bg'];
  document.querySelectorAll('.palette-chip').forEach(c => c.classList.toggle('active', c.dataset.palette === name));
}
function buildPaletteGrid() {
  const grid = document.getElementById('palette-grid');
  grid.innerHTML = Object.entries(PALETTES).map(([key,p]) => `
    <button class="palette-chip${settings.palette===key?' active':''}" data-palette="${key}">
      <div class="palette-preview">${p.dots.map(c=>`<div class="palette-dot" style="background:${c}"></div>`).join('')}</div>
      <span class="palette-name">${p.name}</span>
    </button>`).join('');
  grid.querySelectorAll('.palette-chip').forEach(chip =>
    chip.addEventListener('click', () => applyPalette(chip.dataset.palette)));
}

document.getElementById('btn-settings').addEventListener('click', () => {
  buildPaletteGrid();
  document.getElementById('settings-modal').classList.add('open');
});
document.getElementById('settings-close').addEventListener('click', () =>
  document.getElementById('settings-modal').classList.remove('open'));
document.getElementById('settings-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('settings-modal'))
    document.getElementById('settings-modal').classList.remove('open');
});

// ─── TASKS STATE ─────────────────────────────────────────────────
const LISTS = ['today','soon','someday','done'];
let tasks = {today:[],soon:[],someday:[],done:[]};
let currentList = 'today';
let currentSlide = 0;
let moveTargetId = null;

function loadTasks() {
  try {
    const s = localStorage.getItem('taskflow_tasks');
    if (s) tasks = JSON.parse(s);
    LISTS.forEach(l => { if (!tasks[l]) tasks[l] = []; });
  } catch(e) {}
}
function saveTasks() { localStorage.setItem('taskflow_tasks', JSON.stringify(tasks)); }

// ─── HABITS STATE ─────────────────────────────────────────────────
let habits = [];
let habitLog = {};

function todayKey() { return new Date().toISOString().slice(0,10); }

function loadHabits() {
  try { const h = localStorage.getItem('taskflow_habits'); if (h) habits = JSON.parse(h); } catch(e) {}
  try { const l = localStorage.getItem('taskflow_habit_log'); if (l) habitLog = JSON.parse(l); } catch(e) {}
}
function saveHabits() {
  localStorage.setItem('taskflow_habits', JSON.stringify(habits));
  localStorage.setItem('taskflow_habit_log', JSON.stringify(habitLog));
}

// ─── RENDER TASKS ─────────────────────────────────────────────────
function fmt(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('uk-UA',{day:'2-digit',month:'2-digit',year:'2-digit'})
       + ' ' + d.toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'});
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderAll() {
  LISTS.forEach(list => {
    const el = document.getElementById('slide-'+list);
    const items = tasks[list];
    if (!items.length) {
      const labels = {today:'Немає задач на сьогодні',soon:'Поки нічого на скоро',someday:'Жодної задачі «колись»',done:'Ще нічого не виконано'};
      const icons  = {today:'⚡',soon:'🔜',someday:'🌙',done:'✅'};
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">${icons[list]}</div>${labels[list]}</div>`;
      return;
    }
    el.innerHTML = items.map(t => {
      const isDone = list === 'done';
      const meta = isDone
        ? `<span>створено: ${fmt(t.created)}</span><span class="done-date">✓ ${fmt(t.completed)}</span>`
        : `<span>${fmt(t.created)}</span>`;
      return `
      <div class="task-card" data-id="${t.id}" data-list="${list}">
        <input type="checkbox" class="task-checkbox" ${isDone?'checked':''} data-id="${t.id}" data-list="${list}" />
        <div class="task-body">
          <div class="task-text ${isDone?'done-text':''}">${escHtml(t.text)}</div>
          <div class="task-meta">${meta}</div>
        </div>
        <button class="task-delete task-only-delete" data-id="${t.id}" data-list="${list}" title="Видалити">🗑</button>
      </div>`;
    }).join('');
    el.querySelectorAll('.task-card').forEach(card => attachLongPress(card));
  });
  updateCounts();
}

function updateCounts() {
  LISTS.forEach(l => {
    const cnt = tasks[l].length;
    document.getElementById('count-'+l).textContent = cnt ? cnt : '';
  });
  const total = habits.length;
  const done = (habitLog[todayKey()]||[]).length;
  const el = document.getElementById('count-habits');
  el.textContent = total ? done+'/'+total : '';
}

// ─── RENDER HABITS ────────────────────────────────────────────────
function renderHabits() {
  const el = document.getElementById('slide-habits');
  if (!habits.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">✨</div>Додайте першу звичку</div>`;
    updateCounts(); return;
  }
  const todayDone = new Set(habitLog[todayKey()]||[]);
  el.innerHTML = habits.map(h => {
    const done = todayDone.has(h.id);
    return `
    <div class="habit-card" data-id="${h.id}">
      <input type="checkbox" class="habit-checkbox" ${done?'checked':''} data-id="${h.id}" />
      <span class="habit-name${done?' done-habit':''}">${escHtml(h.name)}</span>
      <button class="task-delete habit-delete" data-id="${h.id}" title="Видалити">🗑</button>
    </div>`;
  }).join('');
  updateCounts();
}

document.addEventListener('change', e => {
  if (e.target.classList.contains('habit-checkbox')) {
    const id = e.target.dataset.id;
    const key = todayKey();
    if (!habitLog[key]) habitLog[key] = [];
    const idx = habitLog[key].indexOf(id);
    if (idx >= 0) habitLog[key].splice(idx,1);
    else habitLog[key].push(id);
    saveHabits(); renderHabits();
    if (currentList==='stats') renderStats();
  } else if (e.target.classList.contains('task-checkbox')) {
    const id = e.target.dataset.id, list = e.target.dataset.list;
    if (list === 'done') {
      const idx = tasks.done.findIndex(t => t.id===id);
      if (idx<0) return;
      const task = {...tasks.done[idx]};
      delete task.completed;
      const origList = task.origList||'today';
      delete task.origList;
      tasks.done.splice(idx,1);
      tasks[origList].unshift(task);
      saveTasks(); renderAll();
      toast('Повернуто до «'+listLabel(origList)+'»');
    } else {
      const idx = tasks[list].findIndex(t => t.id===id);
      if (idx<0) return;
      const task = {...tasks[list][idx], completed:Date.now(), origList:list};
      tasks[list].splice(idx,1);
      tasks.done.unshift(task);
      saveTasks(); renderAll();
    }
  }
});

document.addEventListener('click', e => {
  const hd = e.target.closest('.habit-delete');
  if (hd) {
    const id = hd.dataset.id;
    habits = habits.filter(h => h.id!==id);
    Object.keys(habitLog).forEach(k => { habitLog[k] = habitLog[k].filter(x => x!==id); });
    saveHabits(); renderHabits();
    if (currentList==='stats') renderStats();
    return;
  }
  const td = e.target.closest('.task-only-delete');
  if (td) {
    tasks[td.dataset.list] = tasks[td.dataset.list].filter(t => t.id!==td.dataset.id);
    saveTasks(); renderAll();
  }
});

function addHabit() {
  const input = document.getElementById('input-habits');
  const name = input.value.trim();
  if (!name) return;
  habits.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2), name, createdAt:Date.now()});
  saveHabits(); renderHabits();
  input.value=''; input.focus();
}
document.getElementById('add-habits-btn').addEventListener('click', addHabit);
document.getElementById('input-habits').addEventListener('keydown', e => { if(e.key==='Enter') addHabit(); });

// ─── ADD TASKS ────────────────────────────────────────────────────
function addTask(list) {
  const input = document.getElementById('input-'+list);
  const text = input.value.trim();
  if (!text) return;
  tasks[list].unshift({id:Date.now().toString(36)+Math.random().toString(36).slice(2), text, created:Date.now()});
  saveTasks(); renderAll();
  input.value=''; input.focus();
}
['today','soon','someday'].forEach(list => {
  document.getElementById('add-'+list+'-btn').addEventListener('click', () => addTask(list));
  document.getElementById('input-'+list).addEventListener('keydown', e => { if(e.key==='Enter') addTask(list); });
});

// ─── LONG PRESS ───────────────────────────────────────────────────
function attachLongPress(card) {
  const list = card.dataset.list, id = card.dataset.id;
  let timer;
  const start = () => { timer = setTimeout(() => { card.classList.add('hold-active'); handleLongPress(id,list); }, 500); };
  const cancel = () => { clearTimeout(timer); card.classList.remove('hold-active'); };
  card.addEventListener('touchstart', start, {passive:true});
  card.addEventListener('touchend', cancel);
  card.addEventListener('touchmove', cancel);
  card.addEventListener('mousedown', start);
  card.addEventListener('mouseup', cancel);
  card.addEventListener('mouseleave', cancel);
}
function handleLongPress(id, list) {
  if (list==='soon') {
    moveTask(id,list,'today'); toast('Переміщено до «Сьогодні»');
  } else if (list==='someday') {
    moveTargetId = {id,list};
    document.getElementById('move-modal').classList.add('open');
  } else if (list==='done') {
    const idx = tasks.done.findIndex(t=>t.id===id);
    if (idx<0) return;
    const task = {...tasks.done[idx]};
    const origList = task.origList||'today';
    delete task.completed; delete task.origList;
    tasks.done.splice(idx,1); tasks[origList].unshift(task);
    saveTasks(); renderAll();
    toast('Повернуто до «'+listLabel(origList)+'»');
  }
}
function moveTask(id, from, to) {
  const idx = tasks[from].findIndex(t=>t.id===id);
  if (idx<0) return;
  tasks[to].unshift(tasks[from].splice(idx,1)[0]);
  saveTasks(); renderAll();
}
document.getElementById('move-to-today').addEventListener('click', () => {
  if (!moveTargetId) return;
  moveTask(moveTargetId.id,moveTargetId.list,'today');
  closeMoveModal(); toast('Переміщено до «Сьогодні»');
});
document.getElementById('move-to-soon').addEventListener('click', () => {
  if (!moveTargetId) return;
  moveTask(moveTargetId.id,moveTargetId.list,'soon');
  closeMoveModal(); toast('Переміщено до «Скоро»');
});
document.getElementById('move-cancel').addEventListener('click', closeMoveModal);
document.getElementById('move-modal').addEventListener('click', e => {
  if (e.target===document.getElementById('move-modal')) closeMoveModal();
});
function closeMoveModal() {
  document.getElementById('move-modal').classList.remove('open');
  moveTargetId = null;
  document.querySelectorAll('.task-card.hold-active').forEach(c=>c.classList.remove('hold-active'));
}

// ─── STATS ────────────────────────────────────────────────────────
let statsYear = new Date().getFullYear();
let statsMonth = new Date().getMonth();

const MONTH_NAMES = ['Січень','Лютий','Березень','Квітень','Травень','Червень',
                     'Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];

function renderStats() {
  document.getElementById('stats-month-label').textContent = MONTH_NAMES[statsMonth]+' '+statsYear;
  const now = new Date();
  const isCurrentMonth = statsYear===now.getFullYear() && statsMonth===now.getMonth();
  const todayDay = now.getDate();
  const daysInMonth = new Date(statsYear, statsMonth+1, 0).getDate();
  const nextBtn = document.getElementById('stats-next');
  nextBtn.disabled = isCurrentMonth;

  const table = document.getElementById('stats-table');
  if (!habits.length) {
    table.innerHTML = '<tr><td style="padding:40px 20px;text-align:center;color:var(--text-faint);border:none;white-space:nowrap">Немає звичок</td></tr>';
    return;
  }

  let thead = '<thead><tr><th class="habit-col">Звичка</th>';
  for (let d=1; d<=daysInMonth; d++) {
    const cls = isCurrentMonth && d===todayDay ? ' class="today-th"' : '';
    thead += `<th${cls}>${d}</th>`;
  }
  thead += '</tr></thead>';

  let tbody = '<tbody>';
  habits.forEach(h => {
    tbody += `<tr><td class="habit-name-cell" title="${escHtml(h.name)}">${escHtml(h.name)}</td>`;
    for (let d=1; d<=daysInMonth; d++) {
      const dateKey = `${statsYear}-${String(statsMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isDone = (habitLog[dateKey]||[]).includes(h.id);
      const isFuture = isCurrentMonth && d>todayDay;
      const isToday = isCurrentMonth && d===todayDay;
      let cls = 'day-cell';
      if (isDone) cls += ' day-done';
      else if (isFuture) cls += ' day-future';
      else if (isToday) cls += ' day-today';
      tbody += `<td class="${cls}">${isDone?'✓':''}</td>`;
    }
    tbody += '</tr>';
  });
  tbody += '</tbody>';
  table.innerHTML = thead+tbody;
}

document.getElementById('stats-prev').addEventListener('click', () => {
  statsMonth--; if(statsMonth<0){statsMonth=11;statsYear--;}
  renderStats();
});
document.getElementById('stats-next').addEventListener('click', () => {
  const now = new Date();
  if(statsYear===now.getFullYear() && statsMonth===now.getMonth()) return;
  statsMonth++; if(statsMonth>11){statsMonth=0;statsYear++;}
  renderStats();
});

// ─── TABS & SWIPE ─────────────────────────────────────────────────
const N = 6;
const slideOrder = ['today','soon','someday','done','habits','stats'];
const ADD_SLIDE  = ['today','soon','someday', null, 'habits',  null];

function goToSlide(idx) {
  currentSlide = idx;
  currentList = slideOrder[idx];
  document.getElementById('slides-track').style.transform = `translateX(-${idx*(100/N)}%)`;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  const activeTab = document.querySelectorAll('.tab-btn')[idx];
  if (activeTab) activeTab.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
  ADD_SLIDE.forEach((l,i) => {
    if (!l) return;
    document.getElementById('add-'+l).classList.toggle('visible', i===idx);
  });
  if (currentList==='stats') renderStats();
}

document.querySelectorAll('.tab-btn').forEach((btn,idx) => btn.addEventListener('click', ()=>goToSlide(idx)));

let touchStartX=0, touchStartY=0, dragging=false;
const wrapper = document.getElementById('slides-wrapper');
wrapper.addEventListener('touchstart', e => {
  touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; dragging=true;
}, {passive:true});
wrapper.addEventListener('touchend', e => {
  if (!dragging) return; dragging=false;
  const dx=e.changedTouches[0].clientX-touchStartX, dy=e.changedTouches[0].clientY-touchStartY;
  if (Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>50) {
    if (dx<0 && currentSlide<N-1) goToSlide(currentSlide+1);
    if (dx>0 && currentSlide>0)   goToSlide(currentSlide-1);
  }
}, {passive:true});

// ─── ARCHIVE ──────────────────────────────────────────────────────
document.getElementById('btn-archive').addEventListener('click', async () => {
  const lines = [];
  const labels = {today:'СЬОГОДНІ',soon:'СКОРО',someday:'КОЛИСЬ',done:'ВИКОНАНІ'};
  lines.push('TASKFLOW — Архів '+new Date().toLocaleString('uk-UA'));
  lines.push('='.repeat(50));
  LISTS.forEach(list => {
    lines.push(''); lines.push('── '+labels[list]+' ──');
    if (!tasks[list].length) { lines.push('  (порожньо)'); return; }
    tasks[list].forEach(t => {
      let line = `  [${list==='done'?'x':' '}] ${t.text}`;
      line += `\n      Створено: ${fmt(t.created)}`;
      if (t.completed) line += `\n      Виконано: ${fmt(t.completed)}`;
      lines.push(line);
    });
  });
  const content = lines.join('\n');
  try {
    const handle = await window.showSaveFilePicker({
      suggestedName:`taskflow_archive_${new Date().toISOString().slice(0,10)}.txt`,
      types:[{description:'Text file',accept:{'text/plain':['.txt']}}]
    });
    const w = await handle.createWritable();
    await w.write(content); await w.close();
    toast('Архів збережено ✓');
  } catch(e) {
    if (e.name!=='AbortError') {
      const blob = new Blob([content],{type:'text/plain;charset=utf-8'});
      const a = document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=`taskflow_archive_${new Date().toISOString().slice(0,10)}.txt`;
      a.click(); URL.revokeObjectURL(a.href);
      toast('Архів завантажено ✓');
    }
  }
});

// ─── TOAST ────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2500);
}
function listLabel(l) {
  return {today:'Сьогодні',soon:'Скоро',someday:'Колись',done:'Виконані'}[l]||l;
}

// ─── INIT ─────────────────────────────────────────────────────────
loadSettings();
loadTasks();
loadHabits();
applyPalette(settings.palette);
renderAll();
renderHabits();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
