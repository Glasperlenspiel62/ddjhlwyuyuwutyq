<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta id="meta-theme" name="theme-color" content="#0e0e10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flow">
  <title>Flow</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg: #0e0e10;
      --surface: #18181c;
      --surface2: #222228;
      --border: #2e2e38;
      --text: #e8e8ee;
      --text-dim: #6868a0;
      --text-faint: #38384e;
      --accent-t: #5b8dee;
      --accent-h: #9b74e8;
      --btn-t-bg: #5b8dee22;
      --btn-t-bd: #5b8dee4a;
      --btn-h-bg: #9b74e822;
      --btn-h-bd: #9b74e84a;
      --done: #4a9e8a;
      --good: #2a9d8f;
      --good-bg: #2a9d8f12;
      --good-bd: #2a9d8f38;
      --bad: #e76f51;
      --bad-bg: #e76f5112;
      --bad-bd: #e76f5138;
      --on-accent: #fff;
      --focus-ring: #5b8dee28;
      --r: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SCREENS ── */
    .screen {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      background: var(--bg);
      padding-top: env(safe-area-inset-top, 0px);
    }
    .screen.active { display: flex; }

    /* ── HOME ── */
    #s-home { justify-content: space-between; }

    #home-top {
      padding: 14px 18px 0;
      display: flex; justify-content: flex-end;
    }

    #home-center {
      flex: 1;
      display: flex; flex-direction: column; justify-content: center;
      padding: 0 24px;
      gap: 16px;
    }

    .home-btn {
      padding: 22px 18px;
      border-radius: var(--r);
      font-family: inherit; font-size: 16px; font-weight: 600;
      text-align: left; cursor: pointer;
      transition: opacity 0.15s, transform 0.12s;
      border: 1px solid;
    }
    .home-btn:active { opacity: 0.7; transform: scale(0.96); }

    .home-btn.t {
      background: var(--btn-t-bg);
      color: var(--accent-t);
      border-color: var(--btn-t-bd);
    }
    .home-btn.h {
      background: var(--btn-h-bg);
      color: var(--accent-h);
      border-color: var(--btn-h-bd);
    }

    #home-bottom { height: 40px; }

    /* ── ICON BUTTON ── */
    .icon-btn {
      width: 36px; height: 36px; min-width: 36px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 50%; color: var(--text-dim);
      font-size: 16px; letter-spacing: 1px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.12s;
      flex-shrink: 0;
    }
    .icon-btn:active { opacity: 0.65; transform: scale(0.91); }

    /* ── TASK / HABITS SCREEN HEADER ── */
    #tasks-header, #habits-header {
      padding: 12px 16px 0;
      display: flex; align-items: center;
      gap: 10px; flex-shrink: 0;
    }
    #tasks-header-spacer, #habits-header-spacer { flex: 1; }

    /* ── TABS ── */
    #tasks-tabs, #habits-tabs {
      display: flex; gap: 16px;
      padding: 6px 16px 10px;
      overflow-x: auto; flex-shrink: 0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #tasks-tabs::-webkit-scrollbar, #habits-tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      padding: 6px 4px;
      background: none; border: none;
      border-bottom: 2px solid transparent;
      font-family: inherit; font-size: 13px; font-weight: 600;
      color: var(--text-dim); cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active {
      color: var(--accent-t);
      border-bottom-color: var(--accent-t);
    }
    .tab-btn:active { opacity: 0.7; }
    /* ── GHOST-BTN ── */
    .ghost-btn {
      flex-shrink: 0; padding: 6px 4px;
      background: none; border: none;
      font-family: inherit; font-size: 13px; font-weight: 600;
      color: var(--text-faint); cursor: pointer;
      transition: color 0.15s, opacity 0.15s;
      display: none;
    }
    .ghost-btn:active { opacity: 0.6; }
    .ghost-btn.accent { color: var(--accent-t); }
    #habits-date-btn { margin-left: auto; }
    #habits-date-btn.past { color: var(--accent-t); }
    body:not(.habit-edit-mode) #habits-tabs[data-tab="tracking"] #habits-date-btn { display: block; }
    body:not(.habit-edit-mode) #habits-tabs[data-tab="tracking"] #habits-today-btn.visible { display: block; }

    #tasks-list {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 0 16px 16px;
      -webkit-overflow-scrolling: touch;
    }

    /* ── TASK CARD ── */
    .task-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 13px 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r);
      margin-bottom: 8px;
      user-select: none; -webkit-user-select: none;
      transition: transform 0.1s, border-color 0.15s, box-shadow 0.15s;
    }
    .task-item.held {
      border-color: var(--accent-t);
      box-shadow: 0 0 0 2px var(--focus-ring);
      transform: scale(1.01);
    }

    /* ── CHECKBOX ── */
    .task-check, .habit-check {
      width: 22px; height: 22px; min-width: 22px;
      border-radius: 6px; border: 2px solid var(--border);
      background: var(--surface2);
      cursor: pointer; appearance: none; -webkit-appearance: none;
      position: relative; flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .task-check { margin-top: 1px; }
    .task-check:checked { background: var(--accent-t); border-color: var(--accent-t); }
    .task-check:checked::after, .habit-check:checked::after {
      content: ''; position: absolute; left: 5px; top: 2px;
      width: 7px; height: 11px;
      border: 2px solid var(--bg); border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    .task-body { flex: 1; min-width: 0; }
    .task-text {
      font-size: 15px; line-height: 1.5; word-break: break-word;
    }
    body.edit-mode .task-text { cursor: text; }
    .task-meta {
      font-size: 11px; color: var(--text-faint);
      margin-top: 4px; line-height: 1.4;
      font-variant-numeric: tabular-nums;
    }
    .meta-done { color: var(--done); }

    .task-text-input {
      width: 100%; background: none; border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text); font-family: inherit;
      font-size: 15px; line-height: 1.5; outline: none; padding: 0;
    }

    /* ── REORDER ── */
    .task-reorder {
      display: none; flex-direction: row; gap: 3px;
      align-self: center; flex-shrink: 0;
    }
    .reorder-btn {
      width: 28px; height: 26px; font-size: 13px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .reorder-btn:active { background: var(--border); }

    /* ── CARD-BTN ── */
    .card-btn {
      background: none; border: none; border-radius: 6px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: var(--text-faint);
      transition: color 0.12s, background 0.12s, opacity 0.12s;
    }
    .card-btn:active { opacity: 0.55; }

    /* ── ACTION BUTTONS ── */
    .task-act {
      display: none; width: 28px; height: 28px;
      font-size: 16px; align-self: center;
    }
    .task-act.restore:active { color: var(--accent-t); background: var(--btn-t-bg); }
    .task-act.del:active     { color: var(--bad);      background: var(--bad-bg); }

    body.edit-mode .task-check { display: none !important; }
    body.edit-mode .task-reorder { display: flex; }
    body.edit-mode .task-act { display: flex; }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center; padding: 60px 20px;
      color: var(--text-faint); font-size: 14px;
    }
    .empty-icon { font-size: 28px; margin-bottom: 12px; opacity: 0.35; }

    /* ── ADD AREA ── */
    #tasks-add-wrap {
      flex-shrink: 0;
      padding: 10px 16px calc(env(safe-area-inset-bottom, 0px) + 10px);
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .add-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 4px 4px 4px 14px;
    }
    .add-input {
      flex: 1; background: none; border: none; outline: none;
      font-family: inherit; font-size: 15px; color: var(--text); padding: 10px 0;
    }
    .add-input::placeholder { color: var(--text-faint); }
    .add-btn {
      width: 38px; height: 38px; border-radius: 9px;
      background: var(--accent-t); color: var(--on-accent);
      border: none; font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: opacity 0.15s, transform 0.12s;
    }
    .add-btn:active { opacity: 0.75; transform: scale(0.92); }

    /* ── HABITS TRACKING BAR ── */
    #habits-tracking-bar {
      flex-shrink: 0;
      display: flex; justify-content: flex-end; gap: 12px;
      padding: 10px 16px calc(env(safe-area-inset-bottom, 0px) + 10px);
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .habit-add-btn {
      width: 46px; height: 46px;
      border-radius: var(--r);
      font-family: inherit; font-size: 26px; font-weight: 300;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s, transform 0.12s;
    }
    .habit-add-btn:active { opacity: 0.75; transform: scale(0.96); }
    .habit-add-btn.green { background: var(--good-bg); border: 1px solid var(--good-bd); color: var(--good); }
    .habit-add-btn.red   { background: var(--bad-bg);  border: 1px solid var(--bad-bd);  color: var(--bad); }

    /* ── HABIT ITEMS ── */
    #habits-content { padding: 0 16px 8px; }
    .habit-group-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-faint);
      padding: 10px 2px 6px;
    }
    .habit-item {
      display: flex; flex-direction: column;
      padding: 11px 12px;
      border-radius: var(--r); border: 1px solid;
      margin-bottom: 8px;
    }
    .habit-item.good { background: var(--good-bg); border-color: var(--good-bd); }
    .habit-item.bad  { background: var(--bad-bg);  border-color: var(--bad-bd); }
    .habit-row { display: flex; align-items: center; gap: 10px; }
    .habit-name {
      flex: 1; font-size: 15px; line-height: 1.4; word-break: break-word;
    }
    .habit-field { display: flex; align-items: center; flex-shrink: 0; }
    .habit-item.good .habit-check:checked { background: var(--good); border-color: var(--good); }
    .habit-item.bad  .habit-check:checked { background: var(--bad);  border-color: var(--bad); }
    /* ── FIELD-INPUT ── */
    .field-input {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: inherit; font-size: 14px;
      padding: 5px 8px; outline: none; -webkit-appearance: none;
      appearance: textfield; -moz-appearance: textfield;
    }
    .field-input::-webkit-inner-spin-button,
    .field-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .habit-num-input  { width: 72px; text-align: center; }
    .habit-time-input { width: 86px; text-align: center; }
    .habit-note-btn { width: 30px; height: 30px; }
    .habit-note-btn:active { color: var(--text-dim); background: var(--surface2); }
    .habit-note-btn.has-note { color: var(--text-dim); }
    .habit-note-ta {
      display: none; margin-top: 8px;
      width: 100%; min-height: 54px;
      background: none; border: none;
      border-top: 1px solid var(--border);
      padding: 8px 2px 0;
      color: var(--text); font-family: inherit; font-size: 13px; line-height: 1.5;
      resize: none; outline: none;
    }
    .habit-note-ta::placeholder { color: var(--text-faint); }

    /* ── HABIT EDIT MODE ── */
    .habit-reorder {
      display: none; flex-direction: row; gap: 3px;
      flex-shrink: 0; align-self: center;
    }
    body.habit-edit-mode .habit-reorder { display: flex; }
    body.habit-edit-mode .habit-field   { display: none; }
    body.habit-edit-mode .habit-note-btn { display: none; }
    body.habit-edit-mode .habit-note-ta  { display: none !important; }

    .habit-acts { display: none; gap: 6px; flex-shrink: 0; align-items: center; }
    body.habit-edit-mode .habit-acts { display: flex; }

    .habit-act { font-size: 18px; padding: 4px 6px; }
    .habit-hide:hover, .habit-del:hover { color: var(--text-dim); }

    /* ── CALENDAR ── */
    #habits-calendar-wrap {
      flex: 1; display: none; flex-direction: column; overflow: hidden;
    }
    #calendar-controls {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 16px 10px; flex-shrink: 0;
    }
    #cal-view-tabs { display: flex; gap: 16px; }
    #cal-nav { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    #cal-period-label { font-size: 13px; color: var(--text-dim); white-space: nowrap; }
    #calendar-table-wrap {
      flex: 1; overflow: auto; -webkit-overflow-scrolling: touch;
      padding-bottom: 16px;
    }
    #calendar-table { border-collapse: collapse; width: max-content; min-width: 100%; }
    #calendar-table thead th {
      position: sticky; top: 0; z-index: 2;
      background: var(--bg);
      font-size: 11px; font-weight: 600; color: var(--text-dim);
      padding: 6px 8px; text-align: center;
      border-bottom: 1px solid var(--border);
      min-width: 38px; white-space: nowrap; line-height: 1.4;
    }
    #calendar-table thead th:first-child {
      position: sticky; left: 0; z-index: 3;
      text-align: left; min-width: 120px;
      padding-left: 16px; padding-right: 12px;
    }
    #calendar-table tbody td {
      font-size: 13px; color: var(--text-dim);
      padding: 9px 6px; text-align: center;
      border-bottom: 1px solid var(--border);
      white-space: nowrap; cursor: pointer;
    }
    #calendar-table tbody td:first-child {
      position: sticky; left: 0; z-index: 1;
      background: var(--bg); cursor: default;
      text-align: left; font-size: 13px;
      color: var(--text); font-weight: 500;
      padding-left: 16px; padding-right: 12px;
    }
    #calendar-table tbody td:not(:first-child):active { background: var(--surface2); }
    #calendar-table .cal-today { color: var(--accent-t); }
    #calendar-table thead .cal-today { font-weight: 700; }

    /* ── HABIT ADD MODAL ── */
    .sheet-text-input {
      width: 100%; border-radius: 10px; padding: 12px 14px;
      margin-bottom: 16px; font-size: 15px;
    }
    .field-input::placeholder,
    .sheet-text-input::placeholder { color: var(--text-faint); }
    #habit-type-row { display: flex; gap: 8px; margin-bottom: 18px; }

    /* ── SHEET ── */
    .backdrop {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
      align-items: flex-end; justify-content: center;
    }
    .backdrop.open { display: flex; }
    .sheet {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r) var(--r) 0 0;
      padding: 20px 16px calc(env(safe-area-inset-bottom, 0px) + 16px);
      width: 100%; max-width: 480px;
      animation: up 0.26s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-head {
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 14px;
    }
    .sheet-btn {
      width: 100%; padding: 15px 14px; margin-bottom: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; font-family: inherit; font-size: 15px;
      font-weight: 600; color: var(--text); cursor: pointer; text-align: left;
      transition: opacity 0.12s;
    }
    .sheet-btn:active { opacity: 0.65; }
    .sheet-cancel {
      width: 100%; padding: 14px; margin-top: 4px;
      background: none; border: 1px solid var(--border); border-radius: 10px;
      font-family: inherit; font-size: 14px; color: var(--text-dim); cursor: pointer;
    }

    /* ── SETTINGS ── */
    .settings-head {
      font-size: 17px; font-weight: 700; margin-bottom: 18px;
    }
    .settings-sub {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px;
    }
    #data-btns {
      display: flex; gap: 8px; margin-bottom: 20px;
    }
    #data-btns button {
      flex: 1; padding: 10px 8px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r); color: var(--text);
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
    }
    #data-btns button:active { opacity: 0.65; }
    #palette-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 8px; margin-bottom: 20px;
    }
    .p-chip {
      background: none; border: 2px solid var(--border);
      border-radius: 10px; padding: 10px 4px 8px;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 6px;
      transition: border-color 0.15s;
    }
    .p-chip.active { border-color: var(--accent-t); }
    .p-chip:active { opacity: 0.7; }
    .p-dots { display: flex; gap: 3px; }
    .p-dot { width: 10px; height: 10px; border-radius: 50%; }
    .p-name {
      font-size: 9px; font-weight: 700; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--text-dim);
    }

    /* ── TOAST ── */
    #toast {
      position: fixed; z-index: 400;
      top: calc(env(safe-area-inset-top, 0px) + 56px);
      left: 50%; transform: translateX(-50%) translateY(-6px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 8px 16px;
      font-size: 13px; font-weight: 600; color: var(--text);
      opacity: 0; transition: opacity 0.22s, transform 0.22s;
      pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── CRIMSON OVERRIDES ── */
    body[data-palette="crimson"] .home-btn.t {
      background: var(--accent-t); color: var(--on-accent); border: none;
    }
    body[data-palette="crimson"] .home-btn.h {
      background: var(--accent-h); color: var(--on-accent); border: none;
    }
    body[data-palette="crimson"] .icon-btn {
      background: var(--accent-t); border: none; color: var(--on-accent);
    }
    body[data-palette="crimson"] .task-item {
      background: var(--c-card); border: none; color: var(--on-accent);
    }
    body[data-palette="crimson"] .task-item.held {
      border: 1px solid var(--accent-t);
      box-shadow: 0 0 0 2px var(--card-glow);
    }
    body[data-palette="crimson"] .habit-item {
      color: var(--on-accent); border: none;
    }
    body[data-palette="crimson"] .habit-item.good { background: var(--good); }
    body[data-palette="crimson"] .habit-item.bad  { background: var(--bad); }
    body[data-palette="crimson"] .task-check,
    body[data-palette="crimson"] .habit-check {
      border-color: #fff; background: transparent;
    }
    body[data-palette="crimson"] .task-check:checked,
    body[data-palette="crimson"] .habit-check:checked {
      background: #fff; border-color: #fff;
    }
    body[data-palette="crimson"] .task-check:checked::after,
    body[data-palette="crimson"] .habit-check:checked::after {
      border-color: var(--c-card);
    }
    body[data-palette="crimson"] .habit-item.good .habit-check:checked::after,
    body[data-palette="crimson"] .habit-item.bad  .habit-check:checked::after {
      border-color: var(--good);
    }
    body[data-palette="crimson"] .habit-item.bad .habit-check:checked::after {
      border-color: var(--bad);
    }
    body[data-palette="crimson"] .habit-num-input,
    body[data-palette="crimson"] .habit-time-input {
      border-color: #fff; background: transparent; color: #fff;
    }
    body[data-palette="crimson"] .card-btn {
      color: #fff;
    }
    body[data-palette="crimson"] .card-btn:active { opacity: 0.4; }
    body[data-palette="crimson"] .task-act.del:active,
    body[data-palette="crimson"] .task-act.restore:active { background: rgba(255,255,255,0.12); color: #fff; }
    body[data-palette="crimson"] .task-text-input {

</div>

</div>

let settings = { palette: 'dark' };

}

function applyPalette(name) {
  const p = PALETTES[name]; if (!p) return;
  const r = document.documentElement;
  Object.entries(p.v).forEach(([k,v]) => r.style.setProperty(k, v));
  settings.palette = name; saveSettings();
  document.getElementById('meta-theme').content = p.v['--bg'];
  document.querySelectorAll('.p-chip').forEach(c => c.classList.toggle('active', c.dataset.p === name));
  document.body.dataset.palette = name;
}

function buildPaletteGrid() {
  const g = document.getElementById('palette-grid');
  g.innerHTML = Object.entries(PALETTES).map(([key, p]) => `
    <button class="p-chip${settings.palette===key?' active':''}" data-p="${key}">
      <div class="p-dots">${p.dots.map(c=>`<div class="p-dot" style="background:${c}"></div>`).join('')}</div>
      <span class="p-name">${p.name}</span>
    </button>`).join('');
  g.querySelectorAll('.p-chip').forEach(c => c.addEventListener('click', () => applyPalette(c.dataset.p)));
}

// ── STATE ─────────────────────────────────────────────────────────
let tasks = { today:[], soon:[], someday:[], done:[] };
let curList = null;
let editMode = false;
let holdTimer = null;
let moveId = null;

const LABELS = { today:'Сьогодні', soon:'Скоро', someday:'Колись', done:'Виконані' };
const PLACEHOLDERS = { today:'Нова задача на сьогодні…', soon:'Нова задача на скоро…', someday:'Нова задача колись…' };

function loadTasks() {
  try {
    const s = localStorage.getItem('fl_t');
    if (s) { const d = JSON.parse(s); Object.keys(tasks).forEach(k => { if (d[k]) tasks[k] = d[k]; }); }
  } catch(e) {}
}
function saveTasks() { localStorage.setItem('fl_t', JSON.stringify(tasks)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmt(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('uk-UA',{day:'2-digit',month:'2-digit',year:'2-digit'})
    + ' ' + d.toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'});
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  const isDone = list === 'done';

  document.getElementById('tasks-input').placeholder = PLACEHOLDERS[list] || '';

// ── RENDER ────────────────────────────────────────────────────────
const EMPTY = { today:'Немає задач на сьогодні', soon:'Поки нічого на скоро', someday:'Жодної задачі «колись»', done:'Ще нічого не виконано' };
const EMPTY_ICONS = { today:'○', soon:'◎', someday:'◌', done:'◇' };

function render() {
  const el = document.getElementById('tasks-list');
  const isDone = curList === 'done';
  const items = tasks[curList];

  if (!items.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">${EMPTY_ICONS[curList]}</div>${EMPTY[curList]}</div>`;
    return;
  }

  el.innerHTML = items.map((t, i) => {
    const meta = isDone
      ? `${fmt(t.created)}<br><span class="meta-done">✓ ${fmt(t.completed)}</span>`
      : fmt(t.created);

    const left = isDone
      ? `<button class="card-btn task-act restore" data-id="${t.id}">↩</button>`
      : `<div class="task-reorder">
           <button class="card-btn reorder-btn" data-id="${t.id}" data-d="up">↑</button>
           <button class="card-btn reorder-btn" data-id="${t.id}" data-d="dn">↓</button>
         </div>
         <input type="checkbox" class="task-check" data-id="${t.id}">`;

    return `<div class="task-item" data-id="${t.id}" data-i="${i}">
      ${left}
      <div class="task-body">
        <div class="task-text" data-id="${t.id}">${esc(t.text)}</div>
        <div class="task-meta">${meta}</div>
      </div>
      <button class="card-btn task-act del" data-id="${t.id}">×</button>
    </div>`;
  }).join('');

  if (!isDone && !editMode) {
    el.querySelectorAll('.task-item').forEach(attachHold);
  }
}

// ── TASK ACTIONS ─────────────────────────────────────────────────
function addTask(text) {
  const t = text.trim(); if (!t) return;
  tasks[curList].unshift({ id: uid(), text: t, created: Date.now(), origList: curList });
  saveTasks(); render();
}

function completeTask(id) {
  const idx = tasks[curList].findIndex(t => t.id === id); if (idx < 0) return;
  const task = { ...tasks[curList][idx], completed: Date.now(), origList: curList };
  tasks[curList].splice(idx, 1);
  tasks.done.unshift(task);
  saveTasks(); render();
}

function deleteTask(id) {
  tasks[curList] = tasks[curList].filter(t => t.id !== id);
  saveTasks(); render();
}

function restoreTask(id) {
  const idx = tasks.done.findIndex(t => t.id === id); if (idx < 0) return;
  const task = { ...tasks.done[idx] };
  const dest = task.origList && tasks[task.origList] ? task.origList : 'today';
  delete task.completed;
  tasks.done.splice(idx, 1);
  tasks[dest].unshift(task);
  saveTasks(); render();
  toast(`Повернуто до «${LABELS[dest]}»`);
}

function moveTask(id, to) {
  const idx = tasks[curList].findIndex(t => t.id === id); if (idx < 0) return;
  const task = { ...tasks[curList][idx] };
  tasks[curList].splice(idx, 1);
  tasks[to].unshift(task);
  saveTasks(); render();
}

function reorder(id, dir) {
  const arr = tasks[curList];
  const i = arr.findIndex(t => t.id === id); if (i < 0) return;
  const j = dir === 'up' ? i - 1 : i + 1;
  if (j < 0 || j >= arr.length) return;
  [arr[i], arr[j]] = [arr[j], arr[i]];
  saveTasks(); render();
}

// ── LONG PRESS ────────────────────────────────────────────────────
function attachHold(card) {
  const start = () => {
    holdTimer = setTimeout(() => { card.classList.add('held'); openMoveSheet(card.dataset.id); }, 480);
  };
  const cancel = () => { clearTimeout(holdTimer); card.classList.remove('held'); };
  card.addEventListener('touchstart', start, { passive: true });
  card.addEventListener('touchend', cancel);
  card.addEventListener('touchmove', cancel);
  card.addEventListener('mousedown', start);
  card.addEventListener('mouseup', cancel);
  card.addEventListener('mouseleave', cancel);
}

// ── MOVE SHEET ────────────────────────────────────────────────────
function openMoveSheet(id) {
  moveId = id;
  const targets = ['today','soon','someday'].filter(l => l !== curList);
  const el = document.getElementById('move-options');
  el.innerHTML = targets.map(l =>
    `<button class="sheet-btn" data-to="${l}">${LABELS[l]}</button>`).join('');
  el.querySelectorAll('.sheet-btn').forEach(b => b.addEventListener('click', () => {
    moveTask(moveId, b.dataset.to);
    closeMoveSheet();
    toast(`Переміщено до «${LABELS[b.dataset.to]}»`);
  }));
  document.getElementById('move-modal').classList.add('open');
}

function closeMoveSheet() {
  document.getElementById('move-modal').classList.remove('open');
  document.querySelectorAll('.task-item.held').forEach(c => c.classList.remove('held'));
  moveId = null;
}

// ── CALENDAR HELPERS ──────────────────────────────────────────────
function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDateUk(s) {
  return new Date(s + 'T00:00:00').toLocaleDateString('uk-UA', { day:'numeric', month:'long', year:'numeric' });
}
function getWeekStart(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const day = d.getDay();
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return d;
}
function getCalDates() {
  if (calView === 'week') {
    const s = getWeekStart(calCursor);
    return Array.from({length:7}, (_,i) => { const d = new Date(s); d.setDate(s.getDate()+i); return d; });
  }
  const y = calCursor.getFullYear(), m = calCursor.getMonth();
  const days = new Date(y, m+1, 0).getDate();
  return Array.from({length:days}, (_,i) => new Date(y, m, i+1));
}
function updateCalLabel() {
  const dates = getCalDates();
  let label;
  if (calView === 'week') {
    const s = dates[0].toLocaleDateString('uk-UA',{day:'numeric',month:'short'});
    const e = dates[6].toLocaleDateString('uk-UA',{day:'numeric',month:'short',year:'numeric'});
    label = `${s} – ${e}`;
  } else {
    label = calCursor.toLocaleDateString('uk-UA',{month:'long',year:'numeric'});
    label = label.charAt(0).toUpperCase() + label.slice(1);
  }
  document.getElementById('cal-period-label').textContent = label;
}

const CAL_DAY = ['нд','пн','вт','ср','чт','пт','сб'];

function renderCalendar() {
  const dates = getCalDates();
  const periodStart = dates[0].getTime();
  const periodEnd   = dates[dates.length-1].getTime() + 86399999;
  const today = todayKey();

  const active = habits.filter(h => {
    if (h.created > periodEnd) return false;
    if (h.hidden && h.hiddenAt != null && h.hiddenAt < periodStart) return false;
    return true;
  });

  const wrap = document.getElementById('calendar-table-wrap');
  if (!active.length) {
    wrap.innerHTML = '<div class="empty" style="padding:40px 16px"><div class="empty-icon">◌</div>Немає звичок за цей період</div>';
    return;
  }

  const isWeek = calView === 'week';
  const thead = dates.map(d => {
    const cls = formatDate(d) === today ? ' class="cal-today"' : '';
    const inner = isWeek ? `${CAL_DAY[d.getDay()]}<br>${d.getDate()}` : d.getDate();
    return `<th${cls}>${inner}</th>`;
  }).join('');

  const tbody = active.map(h => {
    const cells = dates.map(d => {
      const ds = formatDate(d);
      const v  = habitValues[`${h.id}_${ds}`];
      const cls = ds === today ? ' cal-today' : '';
      let display = '';
      if (v !== undefined && v !== false && v !== '') {
        display = h.type === 'checkbox' ? '✓' : v;
      }
      return `<td data-id="${h.id}" data-date="${ds}" class="${cls}">${display}</td>`;
    }).join('');
    return `<tr><td>${esc(h.name)}</td>${cells}</tr>`;
  }).join('');

  wrap.innerHTML = `<table id="calendar-table"><thead><tr><th></th>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;

  wrap.querySelector('table').addEventListener('click', e => {
    const td = e.target.closest('td[data-id]');
    if (!td) return;
    const h = habits.find(h => h.id === td.dataset.id);
    const note = habitNotes[`${td.dataset.id}_${td.dataset.date}`] || '';
    document.getElementById('cal-note-head').textContent = h ? h.name : '';
    document.getElementById('cal-note-date').textContent = formatDateUk(td.dataset.date);
    document.getElementById('cal-note-text').value = note;
    document.getElementById('cal-note-text').placeholder = 'Немає примітки на цей день';
    document.getElementById('cal-note-modal').classList.add('open');
  });
}

function renderHabits() {
  const el = document.getElementById('habits-content');
  const dk = trackingDateKey || todayKey();
  const isPast = dk !== todayKey();

  let visible = habits.filter(h => !h.hidden);
  if (isPast) {
    visible = visible.filter(h =>
      habitValues[`${h.id}_${dk}`] !== undefined ||
      habitNotes[`${h.id}_${dk}`]
    );
  }

  if (!visible.length) {
    el.innerHTML = isPast
      ? '<div class="empty"><div class="empty-icon">◇</div>Немає даних за цей день</div>'
      : '<div class="empty"><div class="empty-icon">◇</div>Ще немає звичок</div>';
    return;
  }

  const good = visible.filter(h => h.kind === 'good');
  const bad  = visible.filter(h => h.kind === 'bad');
  let html = '';
  if (good.length) {
    if (bad.length) html += '<div class="habit-group-label">Корисні</div>';
    html += good.map(habitHTML).join('');
  }
  if (bad.length) {
    if (good.length) html += '<div class="habit-group-label">Шкідливі</div>';
    html += bad.map(habitHTML).join('');
  }
  el.innerHTML = html;
}

function todayKey() { return new Date().toISOString().slice(0, 10); }

function habitHTML(h) {

  }

  document.body.classList.toggle('habit-edit-mode', on);

function reorderHabit(id, dir) {
  const h = habits.find(h => h.id === id);
  if (!h) return;
  const group = habits.filter(g => g.kind === h.kind && !g.hidden);
  const gi = group.indexOf(h);
  const ni = dir === 'up' ? gi - 1 : gi + 1;
  if (ni < 0 || ni >= group.length) return;
  const swap = group[ni];
  const ai = habits.indexOf(h), bi = habits.indexOf(swap);
  [habits[ai], habits[bi]] = [habits[bi], habits[ai]];
  saveHabits(); renderHabits();
}

function openHabitConfirm(head, msg, okLabel, cb) {
  document.getElementById('hconfirm-head').textContent = head;
  document.getElementById('hconfirm-msg').textContent = msg;
  document.getElementById('hconfirm-ok').textContent = okLabel;
  habitConfirmCb = cb;
  document.getElementById('hconfirm-modal').classList.add('open');
}
function closeHabitConfirm() {
  document.getElementById('hconfirm-modal').classList.remove('open');
  habitConfirmCb = null;
}

function hideHabit(id) {
  const h = habits.find(h => h.id === id);
  if (!h) return;
  openHabitConfirm('Прибрати звичку', `«${h.name}» буде прибрано зі списку. Дані залишаться в пам'яті.`, 'Прибрати', () => {
    h.hidden = true; h.hiddenAt = Date.now(); saveHabits(); renderHabits();
  });
}

function deleteHabit(id) {
  const h = habits.find(h => h.id === id);
  if (!h) return;
  openHabitConfirm('Видалити звичку', `«${h.name}» буде видалено назавжди.`, 'Видалити', () => {
    habits = habits.filter(h => h.id !== id);
    saveHabits(); renderHabits();
  });
}

function addHabit(name, type, kind) {
  const h = { id: uid(), name, type, kind, created: Date.now() };
  if (kind === 'good') habits.unshift(h);
  else habits.push(h);
  saveHabits(); renderHabits();
}

// ── HABIT MODAL ───────────────────────────────────────────────────
function openHabitModal(kind) {
  habitKindPending = kind;
  habitTypePending = 'checkbox';
  document.getElementById('habit-name-input').value = '';
  document.getElementById('habit-modal-head').textContent =
    kind === 'good' ? 'Корисна звичка' : 'Шкідлива звичка';
  document.querySelectorAll('#habit-type-row .tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.htype === 'checkbox'));
  document.getElementById('habit-add-modal').classList.add('open');
  setTimeout(() => document.getElementById('habit-name-input').focus(), 120);
}

function closeHabitModal() {
  document.getElementById('habit-add-modal').classList.remove('open');
  habitKindPending = null;
}

document.querySelectorAll('#habit-type-row .tab-btn').forEach(b => {
  b.addEventListener('click', () => {
    habitTypePending = b.dataset.htype;
    document.querySelectorAll('#habit-type-row .tab-btn').forEach(t => t.classList.remove('active'));
    b.classList.add('active');
  });
});

document.getElementById('habit-confirm-btn').addEventListener('click', () => {
  const name = document.getElementById('habit-name-input').value.trim();
  if (!name) return;
  addHabit(name, habitTypePending, habitKindPending);
  closeHabitModal();
});
document.getElementById('habit-cancel-btn').addEventListener('click', closeHabitModal);
document.getElementById('habit-add-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('habit-add-modal')) closeHabitModal();
});
document.getElementById('habit-name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('habit-confirm-btn').click();
});

// Confirm modal events
document.getElementById('hconfirm-ok').addEventListener('click', () => { if (habitConfirmCb) habitConfirmCb(); closeHabitConfirm(); });
document.getElementById('hconfirm-cancel').addEventListener('click', closeHabitConfirm);
document.getElementById('hconfirm-modal').addEventListener('click', e => { if (e.target === document.getElementById('hconfirm-modal')) closeHabitConfirm(); });

// Habits content delegation
const habitsContent = document.getElementById('habits-content');
habitsContent.addEventListener('click', e => {
  const reorderBtn = e.target.closest('.habit-reorder .reorder-btn');
  if (reorderBtn) { reorderHabit(reorderBtn.dataset.id, reorderBtn.dataset.d); return; }

  const hideBtn = e.target.closest('.habit-hide');
  if (hideBtn) { hideHabit(hideBtn.dataset.id); return; }

  const delBtn = e.target.closest('.habit-del');
  if (delBtn) { deleteHabit(delBtn.dataset.id); return; }

  const noteBtn = e.target.closest('.habit-note-btn');
  if (!noteBtn) return;
  const item = noteBtn.closest('.habit-item');
  const ta = item.querySelector('.habit-note-ta');
  const open = ta.style.display === 'none' || !ta.style.display;
  ta.style.display = open ? 'block' : 'none';
  if (open) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
});
habitsContent.addEventListener('change', e => {
  if (!e.target.classList.contains('habit-check')) return;
  const id = e.target.closest('.habit-item').dataset.id;
  const key = `${id}_${trackingDateKey || todayKey()}`;
  if (e.target.checked) habitValues[key] = true; else delete habitValues[key];
  saveHabitValues();
});

habitsContent.addEventListener('input', e => {
  if (!e.target.classList.contains('habit-time-input')) return;
  let v = e.target.value.replace(/[^0-9]/g, '');
  if (v.length > 4) v = v.slice(0, 4);
  if (v.length >= 3) v = v.slice(0, 2) + ':' + v.slice(2);
  e.target.value = v;
});

habitsContent.addEventListener('blur', e => {
  const item = e.target.closest('.habit-item');
  if (!item) return;
  const id = item.dataset.id;
  const key = `${id}_${trackingDateKey || todayKey()}`;
  if (e.target.classList.contains('habit-note-ta')) {
    const val = e.target.value.trim();
    if (val) habitNotes[key] = val; else delete habitNotes[key];
    saveHabitNotes();
    item.querySelector('.habit-note-btn').classList.toggle('has-note', !!val);
  } else if (e.target.classList.contains('habit-num-input')) {
    const val = e.target.value.trim();
    if (val) habitValues[key] = val; else delete habitValues[key];
    saveHabitValues();
  } else if (e.target.classList.contains('habit-time-input')) {
    const v = e.target.value.trim();
    const valid = /^([01]\d|2[0-3]):[0-5]\d$/.test(v);
    if (valid) { habitValues[key] = v; e.target.value = v; }
    else { delete habitValues[key]; e.target.value = ''; }
    saveHabitValues();
  }
}, true);

// Calendar navigation
document.getElementById('cal-prev').addEventListener('click', () => {
  if (calView === 'week') calCursor.setDate(calCursor.getDate() - 7);
  else calCursor.setMonth(calCursor.getMonth() - 1);
  updateCalLabel(); renderCalendar();
});
document.getElementById('cal-next').addEventListener('click', () => {
  if (calView === 'week') calCursor.setDate(calCursor.getDate() + 7);
  else calCursor.setMonth(calCursor.getMonth() + 1);
  updateCalLabel(); renderCalendar();
});
document.querySelectorAll('#cal-view-tabs .tab-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#cal-view-tabs .tab-btn').forEach(t => t.classList.remove('active'));
    b.classList.add('active');
    calView = b.dataset.view;
    updateCalLabel(); renderCalendar();
  });
});

// Cal note modal
document.getElementById('cal-note-close').addEventListener('click', () =>
  document.getElementById('cal-note-modal').classList.remove('open'));
document.getElementById('cal-note-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('cal-note-modal'))
    document.getElementById('cal-note-modal').classList.remove('open');
});

// + buttons
document.querySelectorAll('#habits-tracking-bar .habit-add-btn').forEach(b =>
  b.addEventListener('click', () => openHabitModal(b.classList.contains('green') ? 'good' : 'bad')));

// Edit mode
document.getElementById('btn-edit').addEventListener('click', () => setEditMode(!editMode));

// Add task
document.getElementById('tasks-add-btn').addEventListener('click', () => {
  const inp = document.getElementById('tasks-input');
  addTask(inp.value); inp.value = ''; inp.focus();
});
document.getElementById('tasks-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { addTask(e.target.value); e.target.value = ''; }
});

// Task list delegation
const tasksList = document.getElementById('tasks-list');

tasksList.addEventListener('change', e => {
  if (e.target.classList.contains('task-check')) completeTask(e.target.dataset.id);
});

tasksList.addEventListener('click', e => {
  const del = e.target.closest('.task-act.del');
  if (del) { deleteTask(del.dataset.id); return; }

  const restore = e.target.closest('.task-act.restore');
  if (restore) { restoreTask(restore.dataset.id); return; }

  const reorderBtn = e.target.closest('.reorder-btn');
  if (reorderBtn) { reorder(reorderBtn.dataset.id, reorderBtn.dataset.d); return; }

  // Inline text edit
  if (editMode && e.target.classList.contains('task-text') && curList !== 'done') {
    const id = e.target.dataset.id;
    const task = tasks[curList].find(t => t.id === id);
    if (!task) return;
    const inp = document.createElement('input');
    inp.type = 'text'; inp.className = 'task-text-input'; inp.value = task.text;
    e.target.replaceWith(inp);
    inp.focus(); inp.select();
    const save = () => {
      const val = inp.value.trim() || task.text;
      if (val !== task.text) { task.text = val; saveTasks(); }
      const div = document.createElement('div');
      div.className = 'task-text'; div.dataset.id = id; div.textContent = val;
      inp.replaceWith(div);
    };
    inp.addEventListener('blur', save);
    inp.addEventListener('keydown', e2 => { if (e2.key === 'Enter') inp.blur(); });
  }
});

// Move sheet
document.getElementById('move-cancel').addEventListener('click', closeMoveSheet);
document.getElementById('move-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('move-modal')) closeMoveSheet();
});

// Settings
document.getElementById('btn-settings').addEventListener('click', () => {
  buildPaletteGrid();
  document.getElementById('settings-modal').classList.add('open');
});
document.getElementById('settings-close').addEventListener('click', () =>
  document.getElementById('settings-modal').classList.remove('open'));
document.getElementById('settings-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('settings-modal'))
    document.getElementById('settings-modal').classList.remove('open');
});

// ── EXPORT / IMPORT ───────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', () => {
  const data = {
    v: 1,
    tasks:       JSON.parse(localStorage.getItem('fl_t')  || '{}'),
    habits:      JSON.parse(localStorage.getItem('fl_h')  || '[]'),
    habitNotes:  JSON.parse(localStorage.getItem('fl_hn') || '{}'),
    habitValues: JSON.parse(localStorage.getItem('fl_hv') || '{}'),
    settings:    JSON.parse(localStorage.getItem('fl_s')  || '{}'),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date().toISOString().slice(0, 10);
  a.href = url; a.download = `flow-backup-${d}.json`;
  a.click(); URL.revokeObjectURL(url);
});

document.getElementById('btn-import').addEventListener('click', () => {
  document.getElementById('import-file-input').click();
});

document.getElementById('import-file-input').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.v !== 1) throw new Error('unknown version');
      if (data.tasks)       localStorage.setItem('fl_t',  JSON.stringify(data.tasks));
      if (data.habits)      localStorage.setItem('fl_h',  JSON.stringify(data.habits));
      if (data.habitNotes)  localStorage.setItem('fl_hn', JSON.stringify(data.habitNotes));
      if (data.habitValues) localStorage.setItem('fl_hv', JSON.stringify(data.habitValues));
      if (data.settings)    localStorage.setItem('fl_s',  JSON.stringify(data.settings));
      loadSettings(); loadTasks(); loadHabits(); loadHabitNotes(); loadHabitValues();
      applyPalette(settings.palette);
      render();
      setTrackingDate(todayKey());
      toast('Дані завантажено');
    } catch(err) {
      toast('Помилка: невірний файл');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

// ── INIT ──────────────────────────────────────────────────────────
loadSettings();
loadTasks();
loadHabits();
loadHabitNotes();
loadHabitValues();
applyPalette(settings.palette);
document.getElementById('habits-tabs').dataset.tab = 'tracking';
setTrackingDate(todayKey());

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
</script>
</body>
</html>
